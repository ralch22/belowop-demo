name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test-guardrail:
    name: Type check, tests, and security guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: HMAC tests
        run: npm run test:hmac

      - name: Guardrail — no PropertyFinder on public surface
        run: bash scripts/check-no-pf-refs.sh

      - name: Guardrail — no placeholders / NaN / fake contacts on public surface
        run: bash scripts/check-no-placeholders.sh

      - name: Smoke test — public routes contain no forbidden strings
        run: npm run test:smoke
